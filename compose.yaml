services:
  db:
    image: postgres:16-alpine
    container_name: psgr
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - vms-net

  redis_app:
    image: redis:7-alpine
    container_name: redis_app
    restart: on-failure
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vms-net

  backend:
    build: ./backend
    image: vms-backend-img
    container_name: vms-backend
    restart: on-failure
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis_app:6379/0"
    volumes:
      - ./backend:/backend_workdir
      - car_images_data:/backend_workdir/static/car_images
    networks:
      - vms-net
    depends_on:
      - db
      - redis_app
    env_file:
      - .env

  frontend:
    build: ./frontend
    image: vms-frontend-img
    container_name: vms-frontend
    restart: on-failure
    environment:
      VITE_PORT: 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - vms-net
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  car_images_data:

networks:
  vms-net:
    driver: bridge
