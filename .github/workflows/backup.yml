name: Supabase Database Backup

on:
  schedule:
    # Запуск щодня о 03:00 ночі
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Database Dump via Docker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Запускаємо pg_dump всередині офіційного контейнера postgres:17
          # Прапорець --rm видалить контейнер після роботи, а -i дозволить передати вивід
          docker run --rm -i postgres:17 pg_dump "$DATABASE_URL" > ./backup.sql

      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ./backup.sql
          retention-days: 7
