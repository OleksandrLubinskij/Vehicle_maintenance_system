<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VMS</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./src/router.js" defer></script>
    <script
      type="module"
      src="./src/utils/settings_floating_window.js"
      defer
    ></script>
    <script src="./src/components/navbar_burger_menu.js"></script>
    <script type="module" src="./src/utils/change_password_scripts.js" defer></script>
  </head>
  <body class="bg-[#f5f5f5]">
    <header class="main_header bg-[#227b50] p-2">
      <div class="logo_and_name flex flex-row items-center gap-4">
        <img
          src="assets/logo_car.png"
          alt=""
          class="h-8 w-8 md:h-12 md:w-12 lg:h-14 lg:w-14"
        />
        <h1 class="text-white font-bold text-xl md:text-3xl lg:text-4xl">
          Система підтримки автомобілів
        </h1>
      </div>
    </header>
    <nav
      id="nav_menu"
      class="main_nav bg-[#f1efef] flex justify-between items-center py-2 px-6 md:px-8 relative"
    >
      <div class="block md:hidden">
        <button
          id="menu_toggle"
          class="p-2 hover:bg-gray-200 rounded-md transition-colors duration-200"
        >
          <img src="assets/list.svg" alt="" class="h-8 w-8" />
        </button>
      </div>

      <div
        id="inner_nav_menu"
        class="hidden absolute top-full left-0 w-full bg-[#f1efef] flex-col gap-2 p-4 shadow-md z-50 md:static md:flex md:flex-row md:w-auto md:p-0 md:shadow-none md:gap-12 lg:gap-24 text-base md:text-lg lg:text-xl font-medium"
      >
        <button
          id="nav-view"
          class="text-left md:text-center hover:text-emerald-700 transition-colors duration-200 border-b-2 border-transparent hover:border-black p-1"
          data-path="/cars"
        >
          Переглянути
        </button>
        <button
          id="nav-create"
          class="hidden text-left md:text-center hover:text-emerald-700 transition-colors duration-200 border-b-2 border-transparent hover:border-black p-1"
          data-path="/create_car"
        >
          Створити
        </button>
      </div>

      <div class="secondary_section">
        <button
          id="settings_btn"
          class="p-1 hover:bg-gray-200 rounded-full transition-colors duration-300 shrink-0"
        >
          <img src="assets/gear.svg" alt="Налаштування" class="h-7 w-7" />
        </button>

        <div
          id="settings_dropdown"
          class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-xl z-50 p-2 flex flex-col gap-1"
        >
          <div class="text-left w-full px-3 py-2 text-sm text-gray-700">
            Налаштування
          </div>
          <hr class="border-gray-100my-1" />
          <button
            class="text-left w-full px-3 py-2 text-sm mt-2 text-gray-700 hover:bg-gray-100 rounded-md transition-colors"
          >
            Світла тема
          </button>
          <button
            id="change_password_menu_btn"
            class="text-left w-full px-3 py-2 text-sm mt-2 text-gray-700 hover:bg-gray-100 rounded-md transition-colors"
          >
            Змінити пароль
          </button>
          <button
            id="logout_btn"
            class="text-left w-full px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition-colors"
          >
            Вийти
          </button>
        </div>
      </div>
      <div
        id="mobile_dropdown_menu"
        class="hidden absolute top-full left-0 bg-white border-t border-gray-300 flex-col gap-2 p-4 z-50 md:hidden text-sm rounded-lg shadow-xl"
      >
        <div class="text-left w-full px-3 text-sm text-gray-700">Меню</div>
        <hr class="border-gray-100my-1" />
        <button
          class="menu_btn text-left hover:text-emerald-700 hover:bg-gray-200 transition-colors duration-200 p-2 rounded-md"
          data-path="/cars"
        >
          Переглянути
        </button>
        <button
          class="menu_btn text-left hover:text-emerald-700 hover:bg-gray-200 transition-colors duration-200 p-2 rounded-md"
          data-path="/create_car"
        >
          Створити
        </button>
      </div>
    </nav>
    <div
      id="app"
      class="app w-full min-h-[calc(100vh-120px)] mx-auto p-6 flex flex-col"
    ></div>

    <div
      id="change_password_modal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex justify-center items-center p-4"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 relative">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
          Зміна паролю
        </h2>
        <form id="change_password_form" class="flex flex-col gap-4">
          <div>
            <span id="old_password_error" class="text-red-600 text-sm hidden"></span>
            <label for="old_password" class="block text-sm font-medium text-gray-700 mb-1">Поточний пароль</label>
            <input
              type="password"
              id="old_password"
              name="old_password"
              required
              class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            />
          </div>

          <div>
            <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">Новий пароль</label>
            <input
              type="password"
              id="new_password"
              name="new_password"
              required
              class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            />
          </div>
          
          <span id="confirm_password_error" class="text-red-600 text-sm hidden"></span>
          <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Підтвердіть новий пароль</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
              class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            />
          </div>

          <div class="flex justify-end gap-3 mt-4">
            <button
              type="button"
              id="cancel_password_btn"
              class="px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-md transition-colors"
            >
              Скасувати
            </button>
            <button
              type="submit"
              id="change_password_submit_btn"
              class="px-4 py-2 text-white bg-[#227b50] hover:bg-emerald-700 rounded-md transition-colors"
            >
              Зберегти
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
